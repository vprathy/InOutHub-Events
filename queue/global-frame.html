<!DOCTYPE html>

<html class="h-full bg-slate-950" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>InOutHub - Premium App Shell</title>
<!-- Google Fonts: Nunito -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Nunito', 'sans-serif'],
          },
          colors: {
            slate: {
              950: '#020617',
            },
            teal: {
              600: '#10b981',
            }
          }
        }
      }
    }
  </script>
<style data-purpose="global-effects">
    body {
      overflow: hidden; /* Prevent scrolling of the shell itself */
      position: fixed;
      width: 100%;
      height: 100%;
    }
    
    /* Subtle radial glows for the 'Premium Command Center' feel */
    .glow-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: 
        radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 40%);
      z-index: 0;
    }

    .glass-effect {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .active-nav-glow {
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
    }
  </style>
</head>
<body class="text-slate-100 font-sans h-full flex flex-col">
<div class="glow-overlay"></div>
<!-- BEGIN: Orientation Header -->
<header class="relative z-10 px-4 pt-6 pb-4 flex items-center justify-between border-b border-white/5 bg-slate-950/50 backdrop-blur-sm" data-purpose="app-header">
<div class="flex items-center space-x-3">
<!-- Branding Logo Placeholder -->
<div class="w-8 h-8 rounded-lg bg-teal-600 flex items-center justify-center shadow-lg shadow-teal-600/20">
<span class="font-extrabold text-white text-xs">IO</span>
</div>
<div>
<h1 class="text-sm font-extrabold tracking-tight leading-none">InOutHub</h1>
<p class="text-[10px] text-teal-500 font-bold uppercase tracking-widest mt-0.5">Showcase 2026</p>
</div>
</div>
<div class="flex items-center space-x-3">
<!-- User Profile -->
<div class="flex items-center space-x-2 bg-white/5 p-1 pr-3 rounded-full border border-white/10">
<div class="w-7 h-7 rounded-full bg-slate-700 border border-white/20 flex items-center justify-center overflow-hidden">
<span class="text-[10px] font-bold">JD</span>
</div>
<button class="text-slate-400 hover:text-white transition-colors">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</div>
</header>
<!-- END: Orientation Header -->
<!-- BEGIN: Task Surface -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-center p-6" data-purpose="task-surface">
<!-- Visual Indicator for rendering area -->
<div class="w-full h-full border-2 border-dashed border-white/10 rounded-3xl flex flex-col items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-teal-500/5 to-transparent"></div>
<div class="relative z-10 flex flex-col items-center opacity-40">
<svg class="h-12 w-12 mb-4 text-slate-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1"></path>
</svg>
<p class="text-sm font-medium uppercase tracking-widest text-slate-500">Task Surface Placeholder</p>
<p class="text-xs mt-2 text-slate-600">Content renders here</p>
</div>
</div>
</main>
<!-- END: Task Surface -->
<!-- BEGIN: Bottom Navigation -->
<nav class="relative z-20 px-4 pb-8 pt-4 bg-slate-950/80 backdrop-blur-xl border-t border-white/5" data-purpose="bottom-navigation">
<div class="max-w-md mx-auto flex items-center justify-between">
<!-- Dashboard -->
<button class="flex flex-col items-center space-y-1 w-16 opacity-60 hover:opacity-100 transition-all">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold uppercase tracking-tighter">Dash</span>
</button>
<!-- Roster -->
<button class="flex flex-col items-center space-y-1 w-16 opacity-60 hover:opacity-100 transition-all">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold uppercase tracking-tighter">Roster</span>
</button>
<!-- Acts (ACTIVE STATE) -->
<button class="flex flex-col items-center space-y-1 w-16 group">
<div class="relative">
<!-- Active Glow Effect -->
<div class="absolute -inset-2 bg-teal-600/20 rounded-full blur-md active-nav-glow"></div>
<svg class="h-6 w-6 text-teal-500 relative z-10" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] font-extrabold text-teal-500 uppercase tracking-tighter relative z-10">Acts</span>
</button>
<!-- Flow -->
<button class="flex flex-col items-center space-y-1 w-16 opacity-60 hover:opacity-100 transition-all">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold uppercase tracking-tighter">Flow</span>
</button>
<!-- Console -->
<button class="flex flex-col items-center space-y-1 w-16 opacity-60 hover:opacity-100 transition-all">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold uppercase tracking-tighter">Console</span>
</button>
</div>
</nav>
<!-- END: Bottom Navigation -->
</body></html>
