<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>InOutHub - Global Frame</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981", // Teal-600 as primary for active states
                        "background-light": "#f8f6f6",
                        "background-dark": "#020617", // Deep Slate-950
                    },
                    fontFamily: {
                        "display": ["Nunito", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #020617;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 40%);
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .active-glow {
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-slate-100 min-h-screen flex flex-col font-display">
<!-- Header (Section 4.1) -->
<header class="sticky top-0 z-50 glass px-4 py-3 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="relative size-10 rounded-full overflow-hidden border border-white/10">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Professional male user profile avatar photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDt-Y9O35cuW6fKrUdFczVVZGQNGHv3aebb2K2SC7xyTSyChC0DXgc7HUjWTnA1EtHsnWnSMtziz0jWr2eGlIWrgIEKndfMG6Wt1AXE-bkLBEG1ZsZfLuFhiWZ7mnUc9udMMtYWy7cJd885xaRw2cBKGVMdISyLgxehENmsSu5QqI6F14PDxZnPH79yhBUn6rV8wUj6M5bGuqLSqCHzzkv3d15_oWmWpqYm6NlWl0gM2bh8d1TBHPq13t5zqYJy_D-yZbdYhTOO8N8"/>
</div>
<div class="flex flex-col">
<span class="text-xs font-semibold uppercase tracking-wider text-slate-400 leading-none">ZiffyVolve</span>
<span class="text-sm font-bold text-white leading-tight">Tarangini</span>
</div>
</div>
<button class="flex items-center justify-center size-10 rounded-xl bg-white/5 hover:bg-white/10 transition-colors text-slate-300">
<span class="material-symbols-outlined text-[22px]">logout</span>
</button>
</header>
<!-- Task Surface (Section 4.2) -->
<main class="flex-1 flex flex-col p-4 overflow-y-auto">
<div class="flex-1 flex flex-col items-center justify-center rounded-xl border-2 border-dashed border-slate-800 bg-slate-900/20 px-6 py-20">
<div class="flex flex-col items-center gap-4 text-center">
<div class="size-16 rounded-full bg-slate-800/50 flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-slate-500 text-3xl">grid_view</span>
</div>
<h2 class="text-slate-200 text-xl font-bold tracking-tight">Visualize Task Surface</h2>
<p class="text-slate-500 text-sm max-w-[280px]">Central Task Surface Placeholder. Specific page content will render here in the Command Center.</p>
<button class="mt-4 px-6 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm font-bold rounded-xl transition-all border border-white/5">
                    Initialize View
                </button>
</div>
</div>
</main>
<!-- Bottom Navigation (Section 4.3) -->
<nav class="sticky bottom-0 z-50 glass px-2 pb-6 pt-2">
<div class="flex items-center justify-around">
<!-- Dashboard -->
<a class="flex flex-col items-center gap-1 px-3 py-2 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined text-[26px]">dashboard</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Dashboard</span>
</a>
<!-- Roster -->
<a class="flex flex-col items-center gap-1 px-3 py-2 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined text-[26px]">group</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Roster</span>
</a>
<!-- Acts (Active State) -->
<a class="relative flex flex-col items-center gap-1 px-3 py-2 text-primary active-glow" href="#">
<div class="absolute -top-1 w-8 h-1 bg-primary rounded-full shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
<span class="material-symbols-outlined text-[28px] fill-1">layers</span>
<span class="text-[10px] font-extrabold uppercase tracking-widest">Acts</span>
</a>
<!-- Flow -->
<a class="flex flex-col items-center gap-1 px-3 py-2 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined text-[26px]">account_tree</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Flow</span>
</a>
<!-- Console -->
<a class="flex flex-col items-center gap-1 px-3 py-2 text-slate-500 hover:text-slate-300 transition-colors" href="#">
<span class="material-symbols-outlined text-[26px]">terminal</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Console</span>
</a>
</div>
</nav>
</body></html>
